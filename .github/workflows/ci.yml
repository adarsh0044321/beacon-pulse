name: CI

on:
  push:
    branches: [ "main" ]
    tags:
      - "v*"
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag (e.g. nightly or v1.0.1)'
        required: true
        default: 'nightly'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2

    - name: Check formatting
      run: cargo fmt --all -- --check

    - name: Clippy Lints
      run: cargo clippy --all-targets --all-features

    - name: Build Host (Beacon)
      run: cargo build --release -p lanshare-service --bin beacon --features host

    - name: Build Player Backend (Pulse)
      run: cargo build --release -p lanshare-service --bin pulse --features player

    - name: Build Watchdog
      run: cargo build --release -p beacon-watchdog

  release:
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      
    - name: Build All Release Binaries
      run: |
        cargo build --release -p lanshare-service --bin beacon --features host
        cargo build --release -p lanshare-service --bin pulse --features player
        cargo build --release -p beacon-watchdog
        
    - name: Package Release
      run: |
        mkdir release
        copy target\release\beacon.exe release\beacon-host.exe
        copy target\release\pulse.exe release\pulse-client.exe
        copy target\release\beacon-watchdog.exe release\beacon-watchdog.exe
        Compress-Archive -Path release\* -DestinationPath release-windows.zip
        
    - name: Publish Release
      uses: softprops/action-gh-release@v2
      with:
        files: release-windows.zip
        tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}

