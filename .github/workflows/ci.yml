name: CI

on:
  push:
    branches: [ "main" ]
    tags:
      - "v*"
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag (e.g. nightly or v1.0.1)'
        required: true
        default: 'nightly'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Install system dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libasound2-dev pkg-config
    
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2

    - name: Check formatting
      run: cargo fmt --all -- --check

    - name: Clippy Lints (Windows)
      if: matrix.os == 'windows-latest'
      run: cargo clippy --all-targets --all-features

    - name: Clippy Lints (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: cargo clippy -p beacon-pulse --all-targets --all-features

    - name: Build Host (Beacon)
      run: cargo build --release -p beacon-pulse --bin beacon --features host

    - name: Build Player Backend (Pulse)
      run: cargo build --release -p beacon-pulse --bin pulse --features player

    - name: Build Watchdog (Windows)
      if: matrix.os == 'windows-latest'
      run: cargo build --release -p beacon-watchdog

  release:
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v4

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      
    - name: Rust Cache
      uses: Swatinem/rust-cache@v2

    - name: Build All Release Binaries
      shell: bash
      run: |
        cargo build --release -p beacon-pulse --bin beacon --features host
        cargo build --release -p beacon-pulse --bin pulse --features player
        cargo build --release -p beacon-watchdog
        
    - name: Package Release
      run: |
        mkdir release
        copy target\release\beacon.exe release\beacon-host.exe
        copy target\release\pulse.exe release\pulse-client.exe
        copy target\release\beacon-watchdog.exe release\beacon-watchdog.exe
        copy RELEASE_NOTES.txt release\RELEASE_NOTES.txt
        Compress-Archive -Path release\* -DestinationPath release-windows.zip
        
        copy target\release\beacon.exe installer\host\beacon.exe
        copy target\release\beacon-watchdog.exe installer\host\beacon-watchdog.exe
        copy target\release\pulse.exe installer\player\pulse.exe
        C:\Windows\Microsoft.NET\Framework64\v4.0.30319\csc.exe /target:exe /out:installer\host\BeaconSetup.exe /resource:installer\host\beacon.exe,beacon.exe /resource:installer\host\beacon-watchdog.exe,beacon-watchdog.exe installer\BeaconSetup.cs
        C:\Windows\Microsoft.NET\Framework64\v4.0.30319\csc.exe /target:exe /out:installer\player\PulseSetup.exe /resource:installer\player\pulse.exe,pulse.exe installer\player\PulseSetup.cs

    - name: Build Android Player APK
      run: |
        cd apps/ui-android
        ./gradlew.bat assembleDebug
        copy app\build\outputs\apk\debug\app-debug.apk ..\..\PulsePlayer-debug.apk

    - name: Publish Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          release-windows.zip
          installer/host/BeaconSetup.exe
          installer/player/PulseSetup.exe
          PulsePlayer-debug.apk
        name: Release ${{ github.event.inputs.tag_name || github.ref_name }}
        body_path: RELEASE_NOTES.txt
        tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}

  release-linux:
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Install system dependencies (Linux)
      run: |
        sudo apt-get update
        sudo apt-get install -y libasound2-dev pkg-config
    
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      
    - name: Rust Cache
      uses: Swatinem/rust-cache@v2

    - name: Build Linux Release Binaries
      run: |
        cargo build --release -p beacon-pulse --bin beacon --features host
        cargo build --release -p beacon-pulse --bin pulse --features player
        
    - name: Package Release
      run: |
        mkdir -p release-linux
        cp target/release/beacon release-linux/beacon-host
        cp target/release/pulse release-linux/pulse-client
        cp RELEASE_NOTES.txt release-linux/RELEASE_NOTES.txt
        zip -r release-linux.zip release-linux
        
    - name: Publish Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          release-linux.zip
        name: Release ${{ github.event.inputs.tag_name || github.ref_name }}
        body_path: RELEASE_NOTES.txt
        tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}

  deploy-portfolio:
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: portfolio/package-lock.json

      - name: Install dependencies
        run: |
          cd portfolio
          npm ci

      - name: Build portfolio
        run: |
          cd portfolio
          npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: portfolio/dist
          branch: gh-pages

